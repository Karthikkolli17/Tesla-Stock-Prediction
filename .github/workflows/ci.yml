name: CI

on:
  push:
  pull_request:

jobs:
  notebook-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate notebook JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          notebook_path = Path("TimeSeriesProjectCode.ipynb")
          data = json.loads(notebook_path.read_text(encoding="utf-8"))
          assert data.get("cells"), "Notebook has no cells"
          assert data.get("nbformat"), "Notebook missing nbformat"
          print("Notebook structure is valid.")
          PY

